{% extends "layouts/base.html" %}

{% block content %}
{% from 'shared/macros.html' import page_container_start, page_container_end %}

{{ page_container_start() }}

<section class="px-4 py-16 text-center">
    <h1 class="text-4xl font-bold tracking-tight text-slate-900 sm:text-5xl">Generated with success!</h1>

    <div class="my-12 flex justify-center">
        <figure>
            <img class="h-auto w-44" src="{{ kaktos.frontend.url('images/logo.png') }}" alt="Logo" width="180" height="180">
        </figure>
    </div>

    <div class="mx-auto max-w-xl">
        <p class="mb-8 text-lg leading-relaxed text-slate-600">
            It was generated by Kaktos static site generator
        </p>

        <div class="flex flex-col items-center justify-center gap-3 sm:flex-row">
            <a class="inline-flex items-center justify-center rounded-lg border border-slate-300 px-6 py-3 text-base font-semibold text-slate-800 transition hover:bg-slate-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"
                href="https://github.com/paulocoutinhox/kaktos">
                Learn more
            </a>
        </div>
    </div>
</section>

{{ page_container_end() }}

{% endblock %}
