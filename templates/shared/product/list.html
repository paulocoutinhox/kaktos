{% for category in kaktos.config.product_category_data %}

<div class="container mx-auto max-w-6xl px-4">
    <h2 class="mb-8 text-center text-2xl font-bold text-slate-900">
        <a class="text-slate-900 transition hover:text-primary"
            href="{{ url_for('product_category', token=category.token) }}">
            {{ category.name }}
        </a>
    </h2>

    <div class="mx-auto flex max-w-6xl flex-wrap justify-center gap-6">
        {% for product_token in category.products %}
            {% set product_item_data = product.by_token(product_token) %}
            {% include 'shared/product/list-item.html' %}
        {% endfor %}
    </div>
</div>

{% else %}

<div class="container mx-auto my-12 max-w-6xl px-4">
    <div class="py-12 text-center text-slate-600">
        <p class="font-semibold text-slate-700">No products</p>
    </div>
</div>

{% endfor %}
